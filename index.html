<!DOCTYPE html>
<html ng-app="taskBoard">
<head>
    <title>Elite Task Board</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#eef1f5;
            transition:0.3s;
        }

        .night{
            background:#141414;
            color:#fff;
        }

        .panel{
            width:650px;
            margin:50px auto;
            padding:25px;
            border-radius:12px;
            background:#ffffff;
            box-shadow:0 12px 35px rgba(0,0,0,0.15);
        }

        .night .panel{
            background:#222;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        .controls{
            display:flex;
            flex-wrap:wrap;
            gap:10px;
        }

        input, select{
            padding:8px;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            padding:8px 14px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            background:#222;
            color:#fff;
        }

        .night button{
            background:#555;
        }

        .card{
            margin-top:15px;
            padding:12px;
            border-radius:8px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            background:#ddd;
        }

        .card.done{
            text-decoration:line-through;
            opacity:0.6;
        }

        .badge{
            padding:4px 8px;
            border-radius:20px;
            font-size:12px;
            color:white;
        }

        .urgent{ background:#e74c3c; }
        .normal{ background:#f39c12; }
        .relaxed{ background:#27ae60; }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .stats{
            margin-top:15px;
            font-weight:bold;
        }
    </style>
</head>

<body ng-controller="BoardController" ng-class="{'night':dark}">

<div class="panel">

    <div class="top-bar">
        <h1>Task Board</h1>
        <button ng-click="switchMode()">Mode</button>
    </div>

    <div class="controls">
        <input type="text" placeholder="Enter task..." ng-model="taskInput.name">
        <input type="date" ng-model="taskInput.deadline">
        <select ng-model="taskInput.level">
            <option value="urgent">Urgent</option>
            <option value="normal">Normal</option>
            <option value="relaxed">Relaxed</option>
        </select>
        <button ng-click="create()">Add</button>
    </div>

    <div class="stats">
        Total: {{items.length}} | 
        Done: {{countDone()}} | 
        Pending: {{items.length - countDone()}}
    </div>

    <div ng-repeat="item in items track by $index" 
         class="card" 
         ng-class="[item.level, {'done':item.finished}]">

        <div>
            <strong>{{item.name}}</strong><br>
            <small>Due: {{item.deadline || 'No date'}}</small>
        </div>

        <div>
            <span class="badge" ng-class="item.level">
                {{item.level}}
            </span>
            <button ng-click="toggle(item)">✔</button>
            <button ng-click="remove($index)">✖</button>
        </div>

    </div>

</div>

<script>
angular.module("taskBoard",[])
.controller("BoardController", function($scope){

    $scope.items = JSON.parse(localStorage.getItem("boardData")) || [];
    $scope.dark = false;

    function save(){
        localStorage.setItem("boardData", JSON.stringify($scope.items));
    }

    $scope.create = function(){
        if(!$scope.taskInput || !$scope.taskInput.name) return;

        $scope.items.push({
            name: $scope.taskInput.name,
            deadline: $scope.taskInput.deadline,
            level: $scope.taskInput.level || "normal",
            finished:false
        });

        $scope.taskInput = {};
        save();
    };

    $scope.toggle = function(item){
        item.finished = !item.finished;
        save();
    };

    $scope.remove = function(index){
        $scope.items.splice(index,1);
        save();
    };

    $scope.countDone = function(){
        return $scope.items.filter(t => t.finished).length;
    };

    $scope.switchMode = function(){
        $scope.dark = !$scope.dark;
    };

});
</script>

</body>
</html>
